seed: 1337

camera:
  source: obs_scene        # obs_scene | webcam
  id: 0
  name: OBS Virtual Camera
  prefer_obs_virtual_camera: true
  backend: auto            # auto | dshow | msmf
  width: 1280
  height: 720
  target_fps: 20
  frame_skip: 0
  obs:
    host: 127.0.0.1
    port: 4455
    password: ""
    scene_name: Sprite Detection
    image_format: jpg
    image_quality: 80

runtime:
  mode: roi           # roi | detector
  display: true
  overlay: true
  json_output: true
  save_debug_frames: false
  debug_dir: debug_frames

screen:
  enabled: true
  warp_width: 640
  warp_height: 480
  canny_low: 50
  canny_high: 150
  contour_epsilon_ratio: 0.02
  min_screen_area_ratio: 0.2
  fallback_full_frame: true

normalize:
  enabled: true
  clahe_clip_limit: 2.0
  clahe_grid_size: 8
  gamma: 1.0

roi:
  rois:
    - name: enemy_sprite
      x: 0.52
      y: 0.10
      w: 0.42
      h: 0.60

detector:
  model_path: models/detector/yolov8n_pokemon_sprite.pt
  conf_threshold: 0.35
  iou_threshold: 0.45
  max_detections: 6

embedding:
  model_path: models/embedding/mobilenet_metric.pt
  embedding_dim: 256
  device: cpu
  input_size: 128
  allow_untrained: false

matching:
  faiss_index_path: artifacts/reference_index.faiss
  metadata_path: artifacts/reference_metadata.json
  top_k: 5
  similarity_threshold: 0.62
  margin_threshold: 0.07
  unknown_label: unknown

smoothing:
  window_size: 6
  min_votes: 4
  min_stable_confidence: 0.60

logging:
  level: INFO